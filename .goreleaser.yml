version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: lezz
    main: ./cmd/lezz
    binary: lezz
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: lezz
    builds: [lezz]
    # go-selfupdate matches assets by suffix: {os}_{arch}.tar.gz / .zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
